<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login UDEM</title>
</head>
<body>

  <h1>Portal UDEM</h1>

  <!-- BOTÓN LOGIN -->
  <button onclick="login()">Iniciar sesión con Google</button>

  <!-- CONTENIDO OCULTO -->
  <div id="contenido" style="display:none;">
    <h2>Bienvenido 👋</h2>
    <p>Ya tienes acceso al sistema</p>

    <!-- Aquí puedes poner tu simulador o link -->
    <a href="https://jlzer0.github.io/prueba/">Ir al simulador</a>

    <br><br>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- 🔥 FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPG-N3D4m2JC4xM3nbICZKSL_QHzaok7c",
      authDomain: "bridgeaf-01.firebaseapp.com",
      projectId: "bridgeaf-01",
      storageBucket: "bridgeaf-01.firebasestorage.app",
      messagingSenderId: "418926059971",
      appId: "1:418926059971:web:904d02437816886c57dd76"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // LOGIN
    window.login = async function () {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if (user.email.endsWith("@udem.edu.mx")) {
          alert("Bienvenido " + user.email);

          document.getElementById("contenido").style.display = "block";
        } else {
          alert("Solo usuarios UDEM");
          await signOut(auth);
        }

      } catch (error) {
        console.error(error);
        alert("Error en login");
      }
    }

    // LOGOUT
    window.logout = async function () {
      await signOut(auth);
      location.reload();
    }
  </script>

</body>
</html>
