<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPG-N3D4m2JC4xM3nbICZKSL_QHzaok7c",
    authDomain: "bridgeaf-01.firebaseapp.com",
    projectId: "bridgeaf-01",
    storageBucket: "bridgeaf-01.firebasestorage.app",
    messagingSenderId: "418926059971",
    appId: "1:418926059971:web:904d02437816886c57dd76",
    measurementId: "G-7W1BPXGVGR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.login = async function () {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      // 🔐 FILTRO DE DOMINIO
      if (user.email.endsWith("@udem.edu")) {
        alert("Bienvenido " + user.email);

        // 👉 aquí puedes redirigir
        window.location.href = "app.html"; // o mostrar tu simulador
      } else {
        alert("Solo usuarios UDEM");
        await signOut(auth);
      }

    } catch (error) {
      console.error(error);
      alert("Error al iniciar sesión");
    }
  }
</script>
